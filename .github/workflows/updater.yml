name: Auto‑Update README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub seaborn

      - name: Run updater script
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          TARGET_REPO: ${{ github.repository }}   # or hardcode "owner/repo"
        run: python .github/scripts/updater.py
      - name: Run chart script
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          TARGET_REPO: ${{ github.repository }}   # or hardcode "owner/repo"
        run: python .github/scripts/chart.py
      
      - name: Install Official Copilot Extension
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: gh extension install github/gh-copilot

      - name: Generate README using Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }} 
        run: |
          gh copilot -i "Review the current README.md file, based on this readme, look for the new repository in the ./scripts/resources/data.json file, if exist new repo add it in its corresponding section. If nothing new, do nothing." --no-ask-user > README.md
      
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: auto-update README.md via GitHub Copilot [skip ci]"
            git push origin main
          else
            echo "No changes detected in README.md"
          fi

   
      

